<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ui.css" />
</head>
<body class="popup">
  <header class="brand">
    <h1>Parago</h1>
  </header>

  <div class="power">
    <button id="power" type="button" class="power-btn" aria-pressed="true">
      <svg class="power-icon" viewBox="0 0 24 24" width="42" height="42" aria-hidden="true">
        <path d="M12 3v9" />
        <path d="M7.5 6.4a8 8 0 1 0 9 0" />
      </svg>
    </button>
    <p class="power-status" id="status"></p>
  </div>

  <button id="openSettings" class="btn btn-secondary btn-block" data-i18n="popup_open_settings">Open settings</button>

  <section class="card" style="margin-top: 16px;">
    <h2 class="card-title" data-i18n="pending_title">Orders waiting for your approval</h2>
    <div id="pending"></div>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
