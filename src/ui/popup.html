<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="ui.css" />
</head>
<body class="popup">
  <header class="pop-head">
    <img class="pop-mark" src="parago.png" alt="" />
    <span class="pop-name">Parago</span>
    <input type="checkbox" id="power" class="switch pop-switch" role="switch" />
    <button id="openSettings" class="pop-icon-btn" type="button" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
    </button>
  </header>

  <section class="pop-orders" id="pendingSection" hidden>
    <h2 class="pop-orders-title" data-i18n="pending_title">Orders waiting for your approval</h2>
    <div id="pending"></div>
  </section>

  <section class="pop-dev" id="devSection" hidden>
    <button id="devToastBtn" class="btn btn-secondary" type="button" data-i18n="dev_test_toast_btn">Send test notification</button>
    <p class="pop-dev-hint" data-i18n="dev_test_toast_hint">Preview the toast a guardian sees. Nothing is sent.</p>
  </section>
  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
