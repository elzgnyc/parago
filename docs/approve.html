<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parago — Approve purchase</title>
<style>
  @font-face{
    font-family:"Stack Sans Notch";
    src:url("fonts/stack-sans-notch.woff2") format("woff2");
    font-weight:100 900;font-style:normal;font-display:swap;
  }
  :root{
    --bg:#faf6ef;--surface:#fff;--ink:#211c16;--ink-soft:#6f665b;--line:#ece3d5;
    --accent:#146eb4;--accent-strong:#0f5a94;--accent-tint:#e3eef8;--danger:#b3261e;
    --amber:#de7921;--radius:16px;--radius-sm:10px;
    --shadow:0 1px 2px rgba(33,28,22,.05),0 10px 30px rgba(33,28,22,.06);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#161a1f;--surface:#1f272f;--ink:#f3efe8;--ink-soft:#a9a396;--line:#2c353f;
      --accent-tint:#14314a;--accent:#3d9be0;--accent-strong:#63b3ea;}
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:40rem;margin:0 auto;padding:22px 16px 56px}
  .brand{display:flex;align-items:center;gap:10px;margin:6px 2px 16px}
  .brand .mark{font-family:"Stack Sans Notch",system-ui,sans-serif;font-weight:800;
    font-size:1.3rem;color:var(--accent);letter-spacing:.2px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:24px}
  h1{font-family:"Stack Sans Notch",system-ui,sans-serif;font-size:1.5rem;margin:0 0 2px;line-height:1.2}
  .when{color:var(--ink-soft);font-size:.9rem;margin:0 0 16px}
  .total{display:flex;align-items:baseline;gap:8px;padding:12px 14px;background:var(--accent-tint);
    border-radius:var(--radius-sm);margin:0 0 6px}
  .total .lbl{color:var(--ink-soft);font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .total .amt{font-family:"Stack Sans Notch",system-ui,sans-serif;font-weight:800;font-size:1.5rem;margin-left:auto;color:var(--accent-strong)}
  .count{color:var(--ink-soft);font-size:.85rem;margin:10px 2px 2px}
  ul.items{list-style:none;padding:0;margin:8px 0 4px}
  ul.items > li{display:flex;gap:14px;padding:16px 0;border-top:1px solid var(--line)}
  ul.items > li:first-child{border-top:0}
  .num{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--accent-tint);
    color:var(--accent-strong);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .thumb{width:76px;height:76px;object-fit:contain;flex:0 0 auto;border-radius:var(--radius-sm);
    background:#f6f3ee;border:1px solid var(--line)}
  .it-body{min-width:0;flex:1 1 auto}
  .it-title{font-weight:600;line-height:1.32}
  .it-title a{color:var(--ink);text-decoration:none}
  .it-title a:hover{color:var(--accent);text-decoration:underline}
  .it-facts{display:flex;flex-wrap:wrap;gap:4px 12px;align-items:center;margin-top:6px;font-size:.86rem;color:var(--ink-soft)}
  .it-facts .price{color:var(--ink);font-weight:700}
  .it-facts .stars{color:var(--amber);letter-spacing:1px}
  .it-facts a{color:var(--accent);text-decoration:none}
  .it-facts a:hover{text-decoration:underline}
  .it-asin{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.74rem}
  .applink{display:inline-block;margin-top:10px;font-size:.82rem;font-weight:700;text-decoration:none;
    color:var(--accent);padding:6px 12px;border:1.5px solid var(--accent);border-radius:999px}
  .applink:hover{background:var(--accent);color:#fff}
  .more{margin-top:10px}
  .more summary{cursor:pointer;font-size:.83rem;font-weight:600;color:var(--ink-soft);
    list-style:none;display:inline-flex;align-items:center;gap:5px;user-select:none}
  .more summary::before{content:"▸";font-size:.7rem;transition:transform .15s}
  .more[open] summary::before{transform:rotate(90deg)}
  .more summary::-webkit-details-marker{display:none}
  .dl{display:flex;gap:8px;margin:8px 0 0;font-size:.84rem;line-height:1.4}
  .dl-k{flex:0 0 84px;color:var(--ink-soft)}
  .dl-v{flex:1 1 auto}
  ul.bullets{margin:10px 0 2px;padding-left:18px;font-size:.84rem;color:var(--ink);line-height:1.45}
  ul.bullets li{margin:3px 0}
  .actions{display:flex;gap:10px;margin-top:22px}
  button{font:inherit;font-weight:700;font-size:1rem;padding:13px 18px;border-radius:var(--radius-sm);
    border:1.5px solid transparent;cursor:pointer;flex:1 1 0;transition:background .12s,border-color .12s}
  .ok{background:var(--accent);color:#fff}
  .ok:hover{background:var(--accent-strong)}
  .no{background:transparent;color:var(--danger);border-color:var(--line)}
  .no:hover{border-color:var(--danger)}
  button[disabled]{opacity:.5;cursor:default}
  .note{color:var(--danger);font-size:.9rem;margin:12px 2px 0;min-height:1px}
  .center{text-align:center;padding:26px 0;color:var(--ink-soft)}
  .spinner{width:30px;height:30px;margin:0 auto 12px;border:3px solid var(--line);
    border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .done-badge{font-family:"Stack Sans Notch",system-ui,sans-serif;font-size:1.6rem;font-weight:800}
  .done-badge.ok{color:var(--accent-strong)}
  .done-badge.no{color:var(--danger)}
  .retry{margin-top:10px;font:inherit;color:var(--accent);background:none;border:0;cursor:pointer;text-decoration:underline;padding:0}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="mark">Parago</span></div>
  <div class="card" id="app">
    <div class="center"><div class="spinner"></div>Loading this request…</div>
  </div>
</div>
<script>
  // The decision Edge Function (JSON API). Public, non-secret — same base the
  // extension uses. GET ?token returns the purchase; POST {token,verdict} records it.
  var FN_BASE = 'https://khckmoyvuzkjnuvyzjzx.functions.supabase.co';
  var DECISION_URL = FN_BASE + '/decision';
  var app = document.getElementById('app');
  var token = new URLSearchParams(location.search).get('token') || '';

  function clear(el){ while(el.firstChild) el.removeChild(el.firstChild); }
  function elt(tag, opts){
    var e = document.createElement(tag); opts = opts || {};
    if (opts.text != null) e.textContent = opts.text;
    if (opts.cls) e.className = opts.cls;
    if (opts.href) { e.href = opts.href; e.target = '_blank'; e.rel = 'noopener'; }
    return e;
  }
  function httpUrl(u){ return (typeof u === 'string' && /^https?:\/\//i.test(u)) ? u : null; }
  function money(n){ return (typeof n === 'number' && isFinite(n)) ? n.toFixed(2) : '—'; }
  function today(){ return new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}); }

  // Only real product photos (Amazon serves them under /images/I/); reject inline
  // placeholders and loading spinners so the guardian never sees an infinite wheel.
  function productImage(u){
    if (!httpUrl(u) || /^data:/i.test(u)) return null;
    return /(?:media-amazon|images-amazon|ssl-images-amazon)\.com\/images\/I\//i.test(u) ? u : null;
  }
  // Defensive title clean (older requests may carry Amazon's "Opens in a new tab" a11y text).
  function cleanTitle(t){
    return String(t == null ? 'Item' : t).replace(/opens in a new (tab|window)\b\.?/ig,'').replace(/\s+/g,' ').trim() || 'Item';
  }
  function detailLine(label, value){
    var row = elt('div', { cls:'dl' });
    row.appendChild(elt('span', { cls:'dl-k', text:label }));
    row.appendChild(elt('span', { cls:'dl-v', text:String(value) }));
    return row;
  }

  // rating 0..5; reviewCount optional.
  function starString(rating){
    var cr = Math.max(0, Math.min(5, rating));
    var r2 = Math.round(cr*2)/2, full = Math.floor(r2), half = (r2-full)===0.5;
    return '★'.repeat(full) + (half?'½':'') + '☆'.repeat(5-full-(half?1:0));
  }

  var REASONS = {
    not_found:'This link is not valid.', invalid:'This link is not valid.',
    used:'This request was already decided.', decided:'This request was already decided.',
    expired:'This link has expired.',
  };

  // One product row built from DOM nodes (no innerHTML for data) so a hostile
  // title/url can't inject markup.
  function itemRow(it, i){
    var li = elt('li');
    li.appendChild(elt('span', { cls:'num', text:String(i+1) }));

    var img = productImage(it && it.image);
    if (img){
      var im = elt('img', { cls:'thumb' }); im.src = img; im.alt = '';
      im.onerror = function(){ im.remove(); };   // broken URL → drop it, never a spinner
      li.appendChild(im);
    }

    var body = elt('div', { cls:'it-body' });
    // Plain title, no Amazon link: the guardian's browser may not be logged in, and a
    // login wall stalls the whole approval. Everything needed to decide is shown here.
    body.appendChild(elt('div', { cls:'it-title', text: cleanTitle(it && it.title) }));

    var facts = elt('div', { cls:'it-facts' });
    if (typeof it.price === 'number'){
      var line = it.price * (isFinite(Number(it.qty)) && Number(it.qty)>0 ? Number(it.qty) : 1);
      facts.appendChild(elt('span', { cls:'price', text:'$' + money(it.price) }));
      if (isFinite(Number(it.qty)) && Number(it.qty) > 1){
        facts.appendChild(elt('span', { text:'× ' + Math.round(Number(it.qty)) }));
        facts.appendChild(elt('span', { text:'= $' + money(line) }));
      }
    }
    if (typeof it.rating === 'number' && isFinite(it.rating)){
      facts.appendChild(elt('span', { cls:'stars', text: starString(it.rating) + ' ' + Math.max(0,Math.min(5,it.rating)).toFixed(1) }));
      if (typeof it.reviewCount === 'number' && isFinite(it.reviewCount)){
        facts.appendChild(elt('span', { text: Math.round(it.reviewCount).toLocaleString() + ' ratings' }));
      }
    }
    if (it && it.asin) facts.appendChild(elt('span', { cls:'it-asin', text:'ASIN ' + it.asin }));
    if (facts.childNodes.length) body.appendChild(facts);

    // Primary path: open the Amazon APP (already signed in on the phone) to the full
    // product — reviews, Q&A, everything — with no browser login wall. Custom scheme
    // opens the app where installed; a no-op elsewhere, which is why the inline
    // Details below is the fallback.
    if (it && it.asin){
      var appLink = elt('a', { cls:'applink', text:'Open in Amazon app' });
      appLink.href = 'com.amazon.mobile.shopping.web://www.amazon.com/dp/' + encodeURIComponent(it.asin);
      body.appendChild(appLink);
    }

    // Fallback: the richer product detail captured at cart time, shown inline so the
    // guardian never has to leave this page.
    var d = it && it.details;
    if (d && (d.brand || d.dateFirstAvailable || d.rank || (d.bullets && d.bullets.length))){
      var det = elt('details', { cls:'more' });
      det.appendChild(elt('summary', { text:'Details' }));
      if (d.brand) det.appendChild(detailLine('Brand', d.brand));
      if (d.dateFirstAvailable) det.appendChild(detailLine('First listed', d.dateFirstAvailable));
      if (d.rank) det.appendChild(detailLine('Rank', d.rank));
      if (Array.isArray(d.bullets) && d.bullets.length){
        var ul = elt('ul', { cls:'bullets' });
        d.bullets.forEach(function(b){ ul.appendChild(elt('li', { text:String(b) })); });
        det.appendChild(ul);
      }
      body.appendChild(det);
    }

    li.appendChild(body);
    return li;
  }

  function centered(nodes){
    clear(app);
    var d = elt('div', { cls:'center' });
    nodes.forEach(function(n){ d.appendChild(n); });
    app.appendChild(d);
  }
  function message(title, sub){
    centered([elt('h1', { text:title }), sub ? elt('p', { cls:'when', text:sub }) : document.createTextNode('')]);
  }

  function renderApproval(data){
    clear(app);
    app.appendChild(elt('h1', { text:'Approve this purchase?' }));
    app.appendChild(elt('p', { cls:'when', text:today() }));

    var items = Array.isArray(data.items) ? data.items : [];
    var total = elt('div', { cls:'total' });
    total.appendChild(elt('span', { cls:'lbl', text:'Total' }));
    total.appendChild(elt('span', { cls:'amt', text:'$' + money(data.total) }));
    app.appendChild(total);
    app.appendChild(elt('p', { cls:'count', text:items.length + (items.length === 1 ? ' item' : ' items') }));

    var ul = elt('ul', { cls:'items' });
    items.forEach(function(it, i){ ul.appendChild(itemRow(it || {}, i)); });
    app.appendChild(ul);

    var bar = elt('div', { cls:'actions' });
    var approve = elt('button', { cls:'ok', text:'Approve' });
    var reject = elt('button', { cls:'no', text:'Reject' });
    var note = elt('p', { cls:'note' });
    function decide(verdict){
      approve.disabled = reject.disabled = true; note.textContent = '';
      fetch(DECISION_URL, {
        method:'POST', headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ token:token, verdict:verdict }),
      }).then(function(r){ return r.json(); }).then(function(res){
        if (res && res.ok){
          // Show the verdict the SERVER recorded (res.status), not the button clicked.
          var st = res.status || verdict, word = st === 'approved' ? 'Approved' : 'Rejected';
          clear(app);
          app.appendChild(elt('div', { cls:'done-badge ' + (st==='approved'?'ok':'no'), text:word }));
          app.appendChild(elt('p', { cls:'when', text:word + ' on ' + today() + '. You can close this page.' }));
        } else if (res && res.reason && REASONS[res.reason]){
          message(REASONS[res.reason]);
        } else {
          approve.disabled = reject.disabled = false;
          note.textContent = 'Something went wrong. Please try again.';
        }
      }).catch(function(){
        approve.disabled = reject.disabled = false;
        note.textContent = 'Network error. Check your connection and try again.';
      });
    }
    approve.addEventListener('click', function(){ decide('approved'); });
    reject.addEventListener('click', function(){ decide('rejected'); });
    bar.appendChild(approve); bar.appendChild(reject);
    app.appendChild(bar); app.appendChild(note);
  }

  function load(){
    if (!token){ message('Invalid link'); return; }
    clear(app);
    app.appendChild((function(){ var d = elt('div',{cls:'center'}); d.appendChild(elt('div',{cls:'spinner'})); d.appendChild(document.createTextNode('Loading this request…')); return d; })());
    // Abort a hung request so the spinner never spins forever.
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, 15000);
    fetch(DECISION_URL + '?token=' + encodeURIComponent(token), { signal: ctrl.signal })
      .then(function(r){ return r.json(); })
      .then(function(data){
        clearTimeout(timer);
        if (data && data.ok) renderApproval(data);
        else message(REASONS[data && data.reason] || 'This link cannot be used.');
      })
      .catch(function(){
        clearTimeout(timer);
        centered([
          elt('h1', { text:'Could not load this request.' }),
          elt('p', { cls:'when', text:'Check your connection.' }),
          (function(){ var b = elt('button',{cls:'retry',text:'Try again'}); b.addEventListener('click', load); return b; })(),
        ]);
      });
  }
  load();
</script>
</body>
</html>
