# Supabase project config.
# Set project_id to your project ref (the SAME value used in src/config.js and
# the manifest.json host permission). If you already ran `supabase init`, merge
# the [functions.*] blocks below into your existing config.toml instead.
project_id = "khckmoyvuzkjnuvyzjzx"

# These Edge Functions are intentionally PUBLIC (uncredentialed): the extension
# sends no auth header, and the guardian's approval link is a bare browser
# navigation. Supabase verifies JWT by default — WITHOUT verify_jwt = false every
# call returns 401 and the entire feature is dead. (Equivalent at deploy time:
# `supabase functions deploy <name> --no-verify-jwt`.)
[functions.create-request]
verify_jwt = false

[functions.decision]
verify_jwt = false

[functions.get-status]
verify_jwt = false

# Telegram posts bot updates here with no JWT; the extension calls the GET link
# helpers with none either. Auth for Telegram updates is the secret token echoed
# from setWebhook (checked in the function), not a Supabase JWT.
[functions.telegram-webhook]
verify_jwt = false

# The extension POSTs here when an approved order actually completes (confirmation page),
# so the guardian gets an "Order placed" ping. Public, idempotent, notifies only the
# request's already-configured chat.
[functions.order-placed]
verify_jwt = false
